<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPoint — My Classes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  if(localStorage.getItem("sidebar_collapsed")!=="1")return;
  document.documentElement.classList.add("sidebar-pre-collapsed");
  document.addEventListener("DOMContentLoaded",function(){
    var sb=document.getElementById("t-sidebar");
    var mn=document.getElementById("t-main");
    if(!sb)return;
    sb.style.transition="none";
    if(mn)mn.style.transition="none";
    sb.classList.add("collapsed");
    if(mn)mn.classList.add("shifted");
    document.documentElement.classList.remove("sidebar-pre-collapsed");
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        sb.style.transition="";
        if(mn)mn.style.transition="";
      });
    });
  });
})();
</script>
<link rel="stylesheet" href="/static/css/teacherstyle.css">
<style>
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    font-family: var(--font);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover  { color: var(--green-dark); }
  .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="t-sidebar">
  <a class="logo" href="#">
    <div class="logo-icon">
      <img src="/static/assets/Logo.png" alt="PassPoint">
    </div>
    <span class="logo-text">PassPoint</span>
  </a>
  <nav class="nav">
    <a class="nav-item" href="/teacherportal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a class="nav-item" href="/teacherportal/attendance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></svg>
      <span class="nav-label">Attendance</span>
    </a>
    <a class="nav-item" href="/teacherportal/students">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-label">Students</span>
    </a>
    <a class="nav-item" href="/teacherportal/records">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="nav-label">All Records</span>
    </a>
    <a class="nav-item active" href="/teacherportal/classes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="nav-label">My Classes</span>
    </a>
  </nav>
  <div class="user-area">
    <div class="avatar">MS</div>
    <div class="user-info">
      <strong>Ms. Santos</strong>
      <small>Teacher · BSIT</small>
    </div>
  </div>
  <button class="collapse-btn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    <span id="t-collapse-label">Collapse</span>
    
  </button>
</aside>

<!-- MAIN -->
<main class="main" id="t-main">
  <h1 class="page-title">My Classes</h1>
  <p class="page-sub">BSIT 2-12 · Ms. Maria Santos · A.Y. 2024–2025</p>

  <!-- ── Tab Bar ── -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab-classes', this)">Class Cards</button>
    <button class="tab-btn" onclick="switchTab('tab-overview', this)">Class Overview</button>
  </div>

  <!-- ══════════════════════════════════════
       TAB 1 — CLASS CARDS + ENROLLED STUDENTS
       ══════════════════════════════════════ -->
  <div class="tab-panel active" id="tab-classes">

    <!-- Class cards grid -->
    <div id="class-cards" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px"></div>

    <!-- Enrolled students table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div class="card-header" style="padding:12px 16px;border-bottom:1px solid var(--border);margin-bottom:0">
        <span class="card-title">Enrolled Students — <span id="cls-selected-label">All Classes</span></span>
        <select class="input" id="cls-filter" onchange="renderClassStudents()" style="font-size:12px;padding:5px 10px">
          <option value="">All Classes</option>
          <option>Data Structures</option>
          <option>Web Development</option>
          <option>Database Systems</option>
          <option>Software Engineering</option>
          <option>Cybersecurity</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>#</th><th>Student</th><th>Student ID</th><th>Attendance Rate</th><th>Standing</th></tr>
        </thead>
        <tbody id="class-students-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       TAB 2 — CLASS OVERVIEW
       ══════════════════════════════════════ -->
  <div class="tab-panel" id="tab-overview">

    <!-- Per-subject summary cards -->
    <div id="overview-cards" style="display:flex;flex-direction:column;gap:14px;margin-bottom:16px"></div>

    <!-- Student breakdown table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div class="card-header" style="padding:12px 16px;border-bottom:1px solid var(--border);margin-bottom:0;display:flex;align-items:center;gap:10px">
        <span class="card-title">Student Breakdown by Subject</span>
        <select class="input" id="ov-subj-filter" onchange="renderOverviewTable()" style="font-size:12px;padding:5px 10px;margin-left:auto">
          <option value="">All Subjects</option>
          <option>Data Structures</option>
          <option>Web Development</option>
          <option>Database Systems</option>
          <option>Software Engineering</option>
          <option>Cybersecurity</option>
        </select>
      </div>
      <table>
        <thead>
          <tr><th>Student</th><th>Subject</th><th>Present</th><th>Late</th><th>Absent</th><th>Rate</th><th>Standing</th></tr>
        </thead>
        <tbody id="overview-tbody"></tbody>
      </table>
    </div>
  </div>

</main>

<div class="toast" id="toast"><span id="toast-msg"></span></div>
<script src="/static/js/teacher.js"></script>
<script>
window.onload = () => {
  injectDemoRecord();
  renderMyClasses();   // renders class-cards + class-students-tbody
  renderOverview();    // renders overview-cards + overview-tbody
};

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
