<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPoint — My Classes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  if(localStorage.getItem("sidebar_collapsed")!=="1")return;
  document.documentElement.classList.add("sidebar-pre-collapsed");
  document.addEventListener("DOMContentLoaded",function(){
    var sb=document.getElementById("t-sidebar");
    var mn=document.getElementById("t-main");
    if(!sb)return;
    sb.style.transition="none";
    if(mn)mn.style.transition="none";
    sb.classList.add("collapsed");
    if(mn)mn.classList.add("shifted");
    document.documentElement.classList.remove("sidebar-pre-collapsed");
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        sb.style.transition="";
        if(mn)mn.style.transition="";
      });
    });
  });
})();
</script>
<link rel="stylesheet" href="/static/css/teacherstyle.css">
<style>
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    font-family: var(--font);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover  { color: var(--green-dark); }
  .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
</style>
</head>

<!-- MAIN -->
<main class="main" id="t-main">
  <h1 class="page-title">My Classes</h1>
  <p class="page-sub">BSIT 2-12 · Ms. Maria Santos · A.Y. 2024–2025</p>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0">
    <span style="font-size:13px;color:var(--muted)">Click a subject to expand student breakdown</span>
    <select class="input" id="ov-subj-filter" onchange="renderOverview()" style="font-size:12px;padding:5px 10px">
      <option value="">All Subjects</option>
      <option>Data Structures</option>
      <option>Web Development</option>
      <option>Database Systems</option>

</main>

<div class="toast" id="toast"><span id="toast-msg"></span></div>
<script src="/static/js/teacher.js"></script>
<script>
window.onload = () => {

</script>
